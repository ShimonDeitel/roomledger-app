name: roomledger
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  roomledger:
    type: application
    platform: iOS
    sources: [roomledger]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roomledger
        INFOPLIST_FILE: roomledger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: roomledger/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Roomservice Ledger
  roomledgerTests:
    type: bundle.unit-test
    platform: iOS
    sources: [roomledgerTests]
    dependencies:
      - target: roomledger    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  roomledgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [roomledgerUITests]
    dependencies:
      - target: roomledger    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  roomledger:
    build:
      targets:
        roomledger: all
    test:
      targets:
        - roomledgerTests
        - roomledgerUITests
